<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>협업 관리 시스템 프로토타입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUQqv1cwx4OnYxTxve5UmF5nYy2R8fzg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .kanban-column::-webkit-scrollbar,
      .modal-history::-webkit-scrollbar,
      .calendar-grid::-webkit-scrollbar {
        width: 8px;
      }
      .kanban-column::-webkit-scrollbar-thumb,
      .modal-history::-webkit-scrollbar-thumb,
      .calendar-grid::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 9999px;
      }
      .drag-over {
        outline: 2px dashed #60a5fa;
        outline-offset: -6px;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800">
    <div class="flex min-h-screen">
      <aside class="w-72 bg-white border-r border-slate-200 p-5 space-y-6">
        <div>
          <h1 class="text-xl font-bold text-blue-700 flex items-center gap-2">
            <i data-lucide="layers"></i>
            ProStudio Flow
          </h1>
          <p class="text-sm text-slate-500 mt-2">Dooray + Jira 스타일 협업 툴</p>
        </div>

        <nav id="sidebarMenu" class="space-y-2"></nav>

        <div class="p-4 rounded-xl bg-blue-50 border border-blue-100">
          <p class="text-xs text-blue-600 font-semibold">연동 상태</p>
          <p id="integrationStatus" class="text-sm mt-2 text-blue-800">Outlook/Teams 알림 대기 중</p>
        </div>
      </aside>

      <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <header class="mb-6 flex flex-wrap gap-4 items-center justify-between">
          <div>
            <h2 id="pageTitle" class="text-2xl font-bold"></h2>
            <p id="pageDescription" class="text-slate-500 mt-1"></p>
          </div>
          <div class="flex items-center gap-3">
            <button id="sendNotificationBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition">
              Outlook/Teams 알림 발송
            </button>
          </div>
        </header>

        <section id="mainContent"></section>
      </main>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 bg-slate-900/50 z-50 items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="flex items-start justify-between px-6 py-4 border-b border-slate-200">
          <div>
            <p id="modalTaskMeta" class="text-sm text-slate-500"></p>
            <h3 id="modalTaskTitle" class="text-xl font-bold mt-1"></h3>
            <div id="modalTaskTags" class="mt-2 flex gap-2 flex-wrap"></div>
          </div>
          <button id="closeModalBtn" class="text-slate-500 hover:text-slate-700"><i data-lucide="x"></i></button>
        </div>

        <div class="grid md:grid-cols-2 gap-0 flex-1 min-h-0">
          <div class="p-6 border-r border-slate-200 space-y-4 overflow-y-auto">
            <div>
              <label class="text-sm font-semibold">댓글 작성 (멘션 @지원)</label>
              <textarea id="commentInput" class="mt-2 w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-400 focus:outline-none" rows="3" placeholder="예: @민수 QA 완료 후 배포 부탁드립니다."></textarea>
              <button id="addCommentBtn" class="mt-2 px-3 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-900">댓글 등록</button>
            </div>

            <div>
              <label class="text-sm font-semibold">파일 첨부</label>
              <input id="fileInput" type="file" multiple class="mt-2 w-full text-sm" />
              <ul id="attachmentList" class="mt-2 text-sm text-slate-600 space-y-1"></ul>
            </div>

            <div>
              <label class="text-sm font-semibold">클립보드 이미지 붙여넣기 영역</label>
              <div id="pasteZone" class="mt-2 border-2 border-dashed border-slate-300 rounded-lg p-4 text-sm text-slate-500 bg-slate-50" tabindex="0">
                이 영역을 클릭 후 Ctrl/Cmd+V로 이미지를 붙여넣으세요.
              </div>
              <div id="pastedImagePreview" class="mt-3"></div>
            </div>
          </div>

          <div class="p-6 modal-history overflow-y-auto min-h-0">
            <h4 class="font-semibold mb-3">History</h4>
            <ul id="historyList" class="space-y-3"></ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      const appState = {
        currentView: 'dashboard',
        selectedTaskId: null,
        draggedTaskId: null,
      };

      const menus = [
        { key: 'dashboard', name: '통합 대시보드', icon: 'layout-dashboard', description: '요구사항, 워크로드, 최근 활동을 한눈에 확인합니다.' },
        { key: 'kanban', name: '칸반 보드', icon: 'kanban-square', description: '업무 상태를 카드 기반으로 관리합니다.' },
        { key: 'calendar', name: '캘린더', icon: 'calendar-days', description: '월간 일정과 Task 마감일을 관리합니다.' },
      ];

      const badgeStyles = {
        'To-do': 'bg-slate-100 text-slate-700',
        'In-Progress': 'bg-blue-100 text-blue-700',
        Hold: 'bg-amber-100 text-amber-700',
        QA: 'bg-purple-100 text-purple-700',
        Done: 'bg-emerald-100 text-emerald-700',
      };

      const dummyData = {
        requirementList: [
          { reqNo: 'SR-2401', client: '한빛커머스', date: '2026-04-10', discussion: '결제 API 오류 로그 대시보드 추가', status: 'In-Progress', taskId: 1 },
          { reqNo: 'SR-2402', client: '오렌지모빌리티', date: '2026-04-12', discussion: '모바일 푸시 토큰 만료 대응', status: 'QA', taskId: 4 },
          { reqNo: 'SR-2403', client: '해성보험', date: '2026-04-13', discussion: '약관 동의 이력 다운로드 기능', status: 'To-do', taskId: 2 },
          { reqNo: 'SR-2404', client: '블루에너지', date: '2026-04-15', discussion: 'SSO 연동 정책 협의', status: 'Hold', taskId: 5 },
        ],
        workload: [
          { assignee: '민수', count: 8, progress: 78 },
          { assignee: '지은', count: 5, progress: 62 },
          { assignee: '현우', count: 6, progress: 55 },
          { assignee: '서연', count: 4, progress: 85 },
        ],
        recentActivities: [
          { time: '09:10', user: '민수', action: 'SR-2401의 상태를 In-Progress로 변경' },
          { time: '10:42', user: '지은', action: 'QA 체크리스트 업데이트' },
          { time: '11:20', user: '현우', action: '배포 스크립트 수정 커밋 연결' },
          { time: '13:15', user: '서연', action: '클라이언트 코멘트 반영' },
        ],
        tasks: [
          { id: 1, title: '결제 장애 로그 대시보드 추가', assignee: '민수', status: 'In-Progress', dueDate: '2026-04-18', tags: ['#backend', '#critical'], comments: [], history: [{ time: '2026-04-16 09:10', text: '상태 변경: To-do → In-Progress' }] },
          { id: 2, title: '약관 동의 이력 CSV 다운로드', assignee: '지은', status: 'To-do', dueDate: '2026-04-22', tags: ['#frontend'], comments: [], history: [{ time: '2026-04-16 08:40', text: 'Task 생성' }] },
          { id: 3, title: '신규 서버 모니터링 알림 설정', assignee: '현우', status: 'Done', dueDate: '2026-04-09', tags: ['#infra'], comments: [], history: [{ time: '2026-04-15 18:30', text: '상태 변경: QA → Done' }] },
          { id: 4, title: '푸시 토큰 만료 대응 QA', assignee: '서연', status: 'QA', dueDate: '2026-04-17', tags: ['#qa'], comments: [], history: [{ time: '2026-04-16 10:42', text: 'QA 요청 상태로 이동' }] },
          { id: 5, title: 'SSO 권한 정책 재검토', assignee: '민수', status: 'Hold', dueDate: '2026-04-26', tags: ['#security'], comments: [], history: [{ time: '2026-04-16 11:12', text: '고객사 회신 대기 상태로 보류' }] },
          { id: 6, title: '배포 자동화 문서 최신화', assignee: '현우', status: 'To-do', dueDate: '2026-04-20', tags: ['#docs'], comments: [], history: [{ time: '2026-04-16 11:20', text: 'Task 생성' }] },
        ],
      };

      const sidebarMenu = document.getElementById('sidebarMenu');
      const pageTitle = document.getElementById('pageTitle');
      const pageDescription = document.getElementById('pageDescription');
      const mainContent = document.getElementById('mainContent');

      function renderSidebar() {
        sidebarMenu.innerHTML = menus
          .map(
            (menu) => `
            <button data-menu="${menu.key}" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition ${
              appState.currentView === menu.key
                ? 'bg-blue-600 text-white shadow-md'
                : 'bg-slate-50 hover:bg-slate-100 text-slate-700'
            }">
              <i data-lucide="${menu.icon}" class="w-4 h-4"></i>
              <span class="font-medium">${menu.name}</span>
            </button>
          `,
          )
          .join('');

        sidebarMenu.querySelectorAll('button').forEach((btn) => {
          btn.addEventListener('click', () => {
            appState.currentView = btn.dataset.menu;
            renderApp();
          });
        });
      }

      function getTaskById(id) {
        return dummyData.tasks.find((task) => task.id === id);
      }

      function getBadge(status) {
        return `<span class="px-2 py-1 text-xs font-semibold rounded-full ${badgeStyles[status] || 'bg-slate-100'}">${status}</span>`;
      }

      function renderDashboard() {
        return `
          <div class="space-y-6">
            <div class="bg-white rounded-2xl border border-slate-200 p-5 overflow-x-auto">
              <h3 class="text-lg font-semibold mb-4">요구사항 리스트</h3>
              <table class="w-full text-sm min-w-[760px]">
                <thead>
                  <tr class="text-left border-b border-slate-200 text-slate-500">
                    <th class="pb-3">서비스 요청번호</th>
                    <th class="pb-3">고객사</th>
                    <th class="pb-3">요청일</th>
                    <th class="pb-3">협의 내용</th>
                    <th class="pb-3">상태</th>
                  </tr>
                </thead>
                <tbody>
                  ${dummyData.requirementList
                    .map(
                      (row) => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50 cursor-pointer" data-open-task="${row.taskId}">
                      <td class="py-3 font-medium text-blue-700">${row.reqNo}</td>
                      <td class="py-3">${row.client}</td>
                      <td class="py-3">${row.date}</td>
                      <td class="py-3">${row.discussion}</td>
                      <td class="py-3">${getBadge(row.status)}</td>
                    </tr>
                  `,
                    )
                    .join('')}
                </tbody>
              </table>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
              <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <h3 class="text-lg font-semibold mb-4">워크로드 요약</h3>
                <div class="space-y-4">
                  ${dummyData.workload
                    .map(
                      (item) => `
                    <div>
                      <div class="flex justify-between text-sm mb-1">
                        <span>${item.assignee} (${item.count}건)</span>
                        <span class="font-semibold text-slate-600">${item.progress}%</span>
                      </div>
                      <div class="w-full bg-slate-200 rounded-full h-2.5">
                        <div class="h-2.5 rounded-full bg-gradient-to-r from-blue-500 to-cyan-400" style="width: ${item.progress}%"></div>
                      </div>
                    </div>
                  `,
                    )
                    .join('')}
                </div>
              </div>

              <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <h3 class="text-lg font-semibold mb-4">최근 활동 이력</h3>
                <ul class="space-y-4">
                  ${dummyData.recentActivities
                    .map(
                      (activity) => `
                    <li class="relative pl-6">
                      <span class="absolute left-0 top-1.5 w-2.5 h-2.5 rounded-full bg-blue-500"></span>
                      <div class="text-sm text-slate-600">${activity.time}</div>
                      <div class="text-sm"><strong>${activity.user}</strong> - ${activity.action}</div>
                    </li>
                  `,
                    )
                    .join('')}
                </ul>
              </div>
            </div>
          </div>
        `;
      }

      function renderKanban() {
        const columns = ['To-do', 'In-Progress', 'Hold', 'QA', 'Done'];
        return `
          <div class="space-y-4">
            <div class="flex justify-end">
              <button id="addTaskBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">+ 새로운 Task 추가</button>
            </div>
            <div class="grid xl:grid-cols-5 md:grid-cols-2 gap-4">
              ${columns
                .map((col) => {
                  const list = dummyData.tasks.filter((task) => task.status === col);
                  return `
                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-3 min-h-[520px] flex flex-col" data-column="${col}">
                      <div class="flex items-center justify-between mb-3">
                        <h3 class="font-semibold">${col}</h3>
                        <span class="text-xs px-2 py-1 rounded-full bg-white border border-slate-200">${list.length}</span>
                      </div>
                      <div class="kanban-column flex-1 space-y-3 overflow-y-auto" data-drop-zone="${col}">
                        ${list
                          .map(
                            (task) => `
                          <article draggable="true" data-task-id="${task.id}" class="task-card bg-white border border-slate-200 rounded-xl p-3 shadow-sm cursor-grab active:cursor-grabbing hover:border-blue-300">
                            <div class="flex items-start justify-between gap-2">
                              <button class="text-left font-medium text-sm text-slate-700 hover:text-blue-700" data-open-task="${task.id}">${task.title}</button>
                              <button class="text-slate-400 hover:text-rose-500" data-delete-task="${task.id}"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <p class="text-xs text-slate-500 mt-2">담당: ${task.assignee}</p>
                            <p class="text-xs text-slate-500">마감: ${task.dueDate}</p>
                          </article>
                        `,
                          )
                          .join('')}
                      </div>
                    </div>
                  `;
                })
                .join('')}
            </div>
          </div>
        `;
      }

      function renderCalendar() {
        const today = new Date('2026-04-16');
        const year = today.getFullYear();
        const month = today.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const days = [];
        for (let i = 0; i < firstDay; i++) days.push('<div class="bg-white/60 rounded-xl min-h-[110px]"></div>');

        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const dayTasks = dummyData.tasks.filter((task) => task.dueDate === dateStr);
          days.push(`
            <div class="bg-white rounded-xl border border-slate-200 min-h-[110px] p-2 flex flex-col gap-1">
              <div class="text-xs font-semibold text-slate-500">${day}</div>
              ${dayTasks
                .map(
                  (task) => `
                <button data-open-task="${task.id}" class="text-left text-xs p-1 rounded bg-blue-50 text-blue-700 hover:bg-blue-100 truncate">
                  ${task.title}
                </button>
              `,
                )
                .join('')}
            </div>
          `);
        }

        return `
          <div class="bg-white rounded-2xl border border-slate-200 p-5">
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold text-lg">2026년 4월</h3>
              <span class="text-sm text-slate-500">클릭 시 일정 수정 모달 열기</span>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center text-xs font-semibold text-slate-500 mb-2">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="calendar-grid grid grid-cols-7 gap-2 max-h-[70vh] overflow-y-auto">${days.join('')}</div>
          </div>
        `;
      }

      function attachGlobalInteractions() {
        document.querySelectorAll('[data-open-task]').forEach((el) => {
          el.addEventListener('click', () => {
            const taskId = Number(el.dataset.openTask);
            openTaskModal(taskId);
          });
        });

        document.querySelectorAll('[data-delete-task]').forEach((el) => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const taskId = Number(el.dataset.deleteTask);
            const index = dummyData.tasks.findIndex((task) => task.id === taskId);
            if (index >= 0) {
              dummyData.tasks.splice(index, 1);
              renderApp();
            }
          });
        });
      }

      function attachKanbanInteractions() {
        const addBtn = document.getElementById('addTaskBtn');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            const title = prompt('새 Task 제목을 입력하세요.');
            if (!title) return;
            dummyData.tasks.push({
              id: Date.now(),
              title,
              assignee: '미배정',
              status: 'To-do',
              dueDate: '2026-04-30',
              tags: ['#new'],
              comments: [],
              history: [{ time: new Date().toLocaleString('ko-KR'), text: 'Task 생성' }],
            });
            renderApp();
          });
        }

        document.querySelectorAll('.task-card').forEach((card) => {
          card.addEventListener('dragstart', () => {
            appState.draggedTaskId = Number(card.dataset.taskId);
          });
        });

        document.querySelectorAll('[data-drop-zone]').forEach((zone) => {
          zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('drag-over');
          });
          zone.addEventListener('dragleave', () => {
            zone.classList.remove('drag-over');
          });
          zone.addEventListener('drop', () => {
            zone.classList.remove('drag-over');
            const dropStatus = zone.dataset.dropZone;
            const task = getTaskById(appState.draggedTaskId);
            if (task && task.status !== dropStatus) {
              task.history.unshift({
                time: new Date().toLocaleString('ko-KR'),
                text: `상태 변경: ${task.status} → ${dropStatus}`,
              });
              task.status = dropStatus;
              renderApp();
            }
          });
        });
      }

      function openTaskModal(taskId) {
        const task = getTaskById(taskId);
        if (!task) return;

        appState.selectedTaskId = taskId;
        document.getElementById('modalTaskMeta').textContent = `Task #${task.id} · 담당자 ${task.assignee}`;
        document.getElementById('modalTaskTitle').textContent = task.title;
        document.getElementById('modalTaskTags').innerHTML = task.tags
          .map((tag) => `<span class="px-2 py-1 rounded-full text-xs bg-slate-100 text-slate-700">${tag}</span>`)
          .join('');

        const attachmentList = document.getElementById('attachmentList');
        attachmentList.innerHTML = '';
        renderHistory(task);

        const modal = document.getElementById('taskModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');

        lucide.createIcons();
      }

      function closeTaskModal() {
        const modal = document.getElementById('taskModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }

      function renderHistory(task) {
        const historyList = document.getElementById('historyList');
        const merged = [
          ...task.history.map((item) => ({ type: 'history', ...item })),
          ...task.comments.map((item) => ({ type: 'comment', ...item })),
        ].sort((a, b) => new Date(b.time) - new Date(a.time));

        historyList.innerHTML = merged
          .map(
            (item) => `
          <li class="p-3 rounded-lg border border-slate-200 bg-slate-50">
            <p class="text-xs text-slate-500">${item.time}</p>
            <p class="text-sm mt-1 ${item.type === 'comment' ? 'text-slate-800' : 'text-slate-700'}">${item.type === 'comment' ? `<strong>${item.author}</strong>: ${item.text}` : item.text}</p>
          </li>
        `,
          )
          .join('');
      }

      function bindModalEvents() {
        document.getElementById('closeModalBtn').addEventListener('click', closeTaskModal);
        document.getElementById('taskModal').addEventListener('click', (e) => {
          if (e.target.id === 'taskModal') closeTaskModal();
        });

        document.getElementById('addCommentBtn').addEventListener('click', () => {
          const task = getTaskById(appState.selectedTaskId);
          const input = document.getElementById('commentInput');
          const text = input.value.trim();
          if (!task || !text) return;

          task.comments.unshift({
            author: '나',
            text,
            time: new Date().toISOString(),
          });
          task.history.unshift({
            time: new Date().toISOString(),
            text: text.includes('@') ? '멘션 포함 댓글이 등록됨' : '댓글이 등록됨',
          });
          input.value = '';
          renderHistory(task);
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
          const task = getTaskById(appState.selectedTaskId);
          if (!task) return;
          const list = document.getElementById('attachmentList');
          [...e.target.files].forEach((file) => {
            const li = document.createElement('li');
            li.textContent = `📎 ${file.name}`;
            list.appendChild(li);
          });
          task.history.unshift({
            time: new Date().toISOString(),
            text: `${e.target.files.length}개 파일 첨부`,
          });
          renderHistory(task);
        });

        document.getElementById('pasteZone').addEventListener('paste', (event) => {
          const task = getTaskById(appState.selectedTaskId);
          const items = event.clipboardData?.items || [];
          const preview = document.getElementById('pastedImagePreview');

          for (const item of items) {
            if (item.type.includes('image')) {
              const blob = item.getAsFile();
              const url = URL.createObjectURL(blob);
              preview.innerHTML = `<img src="${url}" class="max-h-40 rounded-lg border border-slate-200" alt="붙여넣은 이미지 미리보기" />`;
              if (task) {
                task.history.unshift({
                  time: new Date().toISOString(),
                  text: '클립보드 이미지 첨부',
                });
                renderHistory(task);
              }
            }
          }
        });
      }

      function renderApp() {
        const selectedMenu = menus.find((menu) => menu.key === appState.currentView);
        pageTitle.textContent = selectedMenu.name;
        pageDescription.textContent = selectedMenu.description;

        renderSidebar();

        if (appState.currentView === 'dashboard') {
          mainContent.innerHTML = renderDashboard();
        }
        if (appState.currentView === 'kanban') {
          mainContent.innerHTML = renderKanban();
          attachKanbanInteractions();
        }
        if (appState.currentView === 'calendar') {
          mainContent.innerHTML = renderCalendar();
        }

        attachGlobalInteractions();
        lucide.createIcons();
      }

      document.getElementById('sendNotificationBtn').addEventListener('click', () => {
        document.getElementById('integrationStatus').textContent = 'Outlook/Teams로 알림 발송 완료';
      });

      bindModalEvents();
      renderApp();
    </script>
  </body>
</html>
